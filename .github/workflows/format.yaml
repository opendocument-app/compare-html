name: format

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  pre-commit:
    name: black
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - run: pip install black
    - run: black src tests
    - run: git diff --exit-code
